<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مشروع العمر لنور 🎉</title>
    <style>
        :root { 
            --pink-dark: #db7093; 
            --burgundy: #800020;
            --glass: rgba(255, 255, 255, 0.1);
            --wrong-red: rgba(244, 67, 54, 0.8);
            --correct-green: rgba(76, 175, 80, 0.8);
            --anger-red: #4a0000;
        }
        
        body { 
            background-color: var(--pink-dark); 
            transition: background 0.4s ease;
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; margin: 0; font-family: 'Segoe UI', sans-serif; 
            color: white; overflow: hidden; text-align: center;
            box-shadow: inset 0 0 150px rgba(0,0,0,0.5);
            touch-action: manipulation;
        }

        .screen-shake-active { animation: screenShakeAnim 0.15s ease-in-out infinite; }
        @keyframes screenShakeAnim {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(0px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(2px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(2px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        .disco-bg { animation: discoAnim 1.2s linear infinite !important; }
        @keyframes discoAnim {
            0% { background-color: #db7093; }
            20% { background-color: #9b59b6; }
            40% { background-color: #3498db; }
            60% { background-color: #2ecc71; }
            80% { background-color: #f1c40f; }
            100% { background-color: #e74c3c; }
        }

        .stats { position: absolute; top: 20px; width: 90%; display: flex; justify-content: space-between; font-size: 1.1rem; font-weight: 900; z-index: 10; }

        .float-num { position: fixed; top: 40px; right: 5%; font-size: 1.5rem; font-weight: bold; pointer-events: none; z-index: 10000; animation: floatUpFade 1s ease-out forwards; }
        .float-neg { color: #ff4d4d; }
        .float-pos { color: #2ecc71; }
        @keyframes floatUpFade { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-40px) scale(1.3); opacity: 0; } }

        .message-box { 
            font-size: 1.4rem; font-weight: bold; width: 330px; min-height: 250px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 25px; background: var(--glass); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-radius: 35px; border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3); position: relative; z-index: 20;
            transition: background 0.3s ease, border 0.3s ease;
        }

        .slide-in { animation: slideIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .slide-out { animation: slideOut 0.5s ease-in forwards; }
        @keyframes slideIn { from { transform: translateY(100vh); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes slideOut { from { transform: translateY(0); opacity: 1; } to { transform: translateY(-100vh); opacity: 0; } }
        
        .wrong-state { background: var(--wrong-red) !important; animation: shake 0.4s ease-in-out; border: 2px solid #ff4d4d; }
        .correct-state { background: var(--correct-green) !important; border: 2px solid #2ecc71; }
        
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-12px); } 75% { transform: translateX(12px); } }

        .totem-img-style { position: fixed; bottom: -300px; left: 50%; transform: translateX(-50%); width: 220px; height: 220px; object-fit: cover; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); z-index: 1000; display: none; pointer-events: none; }
        .anger-active { display: block; animation: totemMinecraftStyle 2.2s cubic-bezier(0.15, 0.85, 0.35, 1) forwards; }

        @keyframes totemMinecraftStyle {
            0% { bottom: -300px; opacity: 0; transform: translateX(-50%) scale(0.3) rotate(0deg); }
            15% { bottom: 35%; opacity: 1; transform: translate(-50%, 0) scale(1.6) rotate(-10deg); }
            25% { transform: translate(-45%, -5px) scale(1.4) rotate(15deg); }
            35% { transform: translate(-55%, 5px) scale(1.5) rotate(-15deg); }
            45% { transform: translate(-48%, -3px) scale(1.4) rotate(10deg); }
            55% { transform: translate(-52%, 2px) scale(1.45) rotate(-10deg); }
            65% { bottom: 40%; opacity: 1; transform: translate(-50%, 0) scale(1.4) rotate(0deg); }
            100% { bottom: 120vh; opacity: 0; transform: translate(-50%, -100px) scale(0.6) rotate(5deg); }
        }

        .fx-img { position: fixed; width: 120px; height: 120px; object-fit: cover; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); z-index: 995; display: none; pointer-events: none; }
        
        .img-heart-active { display: block; animation: flyLeftToRight 3s linear forwards; }
        @keyframes flyLeftToRight {
            0% { left: -150px; top: 40%; transform: rotate(0deg) scale(0.8); }
            50% { transform: rotate(180deg) scale(1.2); }
            100% { left: calc(100vw + 150px); top: 40%; transform: rotate(360deg) scale(0.8); }
        }

        .img-phone-active { display: block; animation: bounceToCeiling 4s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
        @keyframes bounceToCeiling {
            0% { right: 5%; bottom: -150px; transform: scale(0.7) rotate(0deg); }
            15% { right: 15%; bottom: 20%; transform: scale(1.1) rotate(-10deg); }
            45% { right: 50%; bottom: calc(100vh - 140px); transform: scale(1.3) rotate(15deg); } 
            55% { right: 60%; bottom: calc(100vh - 140px); transform: scale(1.3) rotate(-15deg); }
            80% { right: 85%; bottom: 20%; transform: scale(1.1) rotate(10deg); }
            100% { right: calc(100vw + 150px); bottom: -150px; transform: scale(0.7) rotate(0deg); }
        }

        .manga-combo {
            position: fixed; pointer-events: none; font-size: 2.8rem; font-weight: 900;
            font-style: italic; color: #ffeb3b; -webkit-text-stroke: 2px #000;
            text-shadow: 4px 4px 0px #e74c3c; z-index: 99999;
            transform: scale(0); animation: mangaPop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.5) forwards;
        }
        @keyframes mangaPop {
            0% { transform: translate(-50%, -50%) scale(0) rotate(-20deg); opacity: 0; }
            50% { transform: translate(-50%, -65%) scale(1.3) rotate(15deg); opacity: 1; }
            100% { transform: translate(-50%, -90%) scale(1) rotate(-5deg); opacity: 0; }
        }

        .cat-gif { 
            width: 140px; height: 140px; border-radius: 20px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.4); display: none; 
            position: fixed; cursor: grab; user-select: none; z-index: 9999;
        }
        .cat-gif:active { cursor: grabbing; }

        #bounce-guide { display: none; font-size: 1.1rem; color: #fff; background: rgba(0,0,0,0.6); padding: 8px 15px; border-radius: 20px; margin-bottom: 15px; font-weight: bold; }

        .letter-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            width: 85%; max-width: 400px; background: #fff; color: #333; padding: 30px 20px;
            border-radius: 25px; box-shadow: 0 30px 60px rgba(0,0,0,0.6); z-index: 100000;
            direction: rtl; text-align: right; overflow-y: auto; max-height: 80vh;
            border: 5px solid #ffb6c1; transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .letter-modal.open { transform: translate(-50%, -50%) scale(1); }
        .letter-text { font-size: 1.15rem; line-height: 1.8; font-weight: bold; color: #444; white-space: pre-line; }
        .letter-date { text-align: left; font-size: 0.95rem; color: #888; margin-top: 15px; font-weight: bold; }

        .stats-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            width: 80%; max-width: 350px; background: rgba(0, 0, 0, 0.92); color: #fff; padding: 25px;
            border-radius: 25px; border: 2px solid var(--pink-dark); text-align: center; z-index: 100005;
            transition: transform 0.4s ease;
        }
        .stats-modal.open { transform: translate(-50%, -50%) scale(1); }
        .stat-line { font-size: 1.2rem; margin: 12px 0; font-weight: bold; }

        .heart-fly { position: absolute; pointer-events: none; font-size: 50px; animation: heartAnim 0.8s ease-out forwards; z-index: 5000; }
        @keyframes heartAnim { 0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; } 20% { transform: translate(-50%, -60%) scale(1.2); opacity: 1; } 100% { transform: translate(-50%, -250%) scale(1.5); opacity: 0; } }

        .ghost-img-style { position: fixed; width: 280px; height: 280px; object-fit: cover; border-radius: 35px; box-shadow: 0 25px 50px rgba(0,0,0,0.7); z-index: 9999; display: none; pointer-events: none; }
        .ghost-active { display: block; animation: ghostZoom 1.2s ease-out forwards; }
        @keyframes ghostZoom { 0% { transform: translate(-50%, -50%) scale(0.1); left: 50%; top: 50%; opacity: 0; } 50% { transform: translate(-50%, -50%) scale(1.8); left: 50%; top: 50%; opacity: 1; } 100% { transform: translate(-50%, -50%) scale(0); left: 50%; top: 50%; opacity: 0; } }

        .timer-container { width: 90%; background: rgba(255,255,255,0.2); height: 12px; border-radius: 6px; margin-top: 15px; overflow: hidden; display: none; }
        .timer-bar { width: 0%; height: 100%; background: #ffeb3b; transition: width 0.1s linear; }

        input[type="text"] { width: 85%; padding: 12px; margin: 10px 0; border-radius: 12px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.1); color: white; text-align: center; outline: none; }
        .btn-main { background: var(--pink-dark); color: white; border: none; padding: 12px 25px; border-radius: 15px; margin-top: 10px; cursor: pointer; font-weight: bold; width: 90%; transition: transform 0.2s; }
        .btn-main:hover { transform: scale(1.05); }
        .btn-skip { background: none; border: none; color: rgba(255,255,255,0.6); margin-top: 15px; cursor: pointer; font-size: 0.9rem; }
        .btn-evade { min-width: 140px; white-space: nowrap; z-index: 9999; }

        .audio-controls { position: fixed; bottom: 20px; left: 20px; display: flex; align-items: center; gap: 10px; z-index: 10000; background: var(--glass); padding: 5px 15px 5px 5px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(10px); }
        .mute-btn { background: none; border: none; font-size: 22px; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; }
        .vol-slider { width: 80px; cursor: pointer; accent-color: var(--pink-dark); }

        .peek-img-container {
            position: fixed; right: -160px; top: 40%; width: 140px; height: 140px; z-index: 999;
            transition: right 0.5s cubic-bezier(0.25, 1, 0.5, 1); pointer-events: none;
        }
        .peek-active { right: 10px; }
        .peek-img-container img { width: 100%; height: 100%; object-fit: cover; border-radius: 25px; box-shadow: -5px 10px 20px rgba(0,0,0,0.3); }

        .mosquito {
            position: fixed; width: 70px; height: 70px; z-index: 99998;
            cursor: pointer; display: none; user-select: none;
            animation: smoothMosquitoFly 4s ease-in-out infinite alternate;
        }
        @keyframes smoothMosquitoFly {
            0% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(40px, -30px) scale(1.05); }
            50% { transform: translate(-20px, 50px) scale(0.95); }
            75% { transform: translate(50px, 20px) scale(1.1); }
            100% { transform: translate(-30px, -40px) scale(1); }
        }
        .mosquito-hit { filter: brightness(0.6) sepia(1) saturate(600%) hue-rotate(-50deg); }
        
        .mc-hearts-container {
            position: absolute; top: -20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 2px; justify-content: center; width: 100px; pointer-events: none;
        }
        .mc-heart {
            width: 12px; height: 12px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 9 9"><path d="M2,0h1v1h1v1h1V1h1V0h1v1h1v2H7v1H6v1H5v1H4V5H3V4H2V3H1V1H2V0z" fill="%23ff0000"/><path d="M2,1H1v2h1V1z M7,1H6v2h1V1z" fill="%23ffffff"/></svg>');
            background-size: contain; background-repeat: no-repeat;
        }

        /* --- أنيميشن انفجار جزيئات الموت والضرر الجديدة --- */
        .dead-particle {
            position: fixed; pointer-events: none; z-index: 100001; font-size: 24px;
            animation: burstParticleAnim 0.6s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
        }
        @keyframes burstParticleAnim {
            0% { transform: translate(-50%, -50%) scale(1) translate(0, 0); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(0.3) translate(var(--x), var(--y)); opacity: 0; }
        }
    </style>
</head>

            const angle = Math.random() * Math.PI * 2;
            const distance = 40 + Math.random() * 90;
            const moveX = Math.cos(angle) * distance + 'px';
            const moveY = Math.sin(angle) * distance + 'px';
            
            p.style.setProperty('--x', moveX);
            p.style.setProperty('--y', moveY);
            
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 600);
        }
    }

        const box = document.getElementById('main-box');
        let isCorrect = false;

        if (questions[clicks].isCustomThreeWords) {
            let tokens = val.split(/\s+/).filter(t => t !== "");
            if (tokens.length === 3) {
                let checkJad = tokens.some(t => ["جاد", "جادو", "جدودتي"].includes(t));
                let checkCoffee = tokens.some(t => ["قهوه", "قهوة"].includes(t));
                let checkCat = tokens.some(t => ["بسه", "بسة"].includes(t));
                if (checkJad && checkCoffee && checkCat) {
                    isCorrect = true;
                }
            }
        } else {
            isCorrect = questions[clicks].a.map(v => v.toLowerCase()).includes(val.toLowerCase());
        }

        if (isCorrect) { 
            correctAnswersCount++;
            document.getElementById('snd-correct').play().catch(o=>{}); box.classList.add('correct-state'); setTimeout(nextStep, 600);

            wrongAnswersCount++;

        e.stopPropagation(); clearTotemView();
        if (type === 1) { 
            lives += 10; document.getElementById('lives').innerText = lives; floatNumber("+10 ❤️", true);
            isPaused = false; document.body.style.backgroundColor = "var(--pink-dark)"; nextStep(); 
        } else { 
            document.body.style.backgroundColor = "var(--burgundy)";
            const text = document.getElementById('text-display'); const area = document.getElementById('interactive-area');
            text.innerText = "شوف القادحه يلا عيدي من اول هههههه يحرام";
            area.innerHTML = `<button class="btn-main" onclick="resetGame(event)">إعادة اللعبة</button>`;
        }
    }

    function startGrandFinale() {
        isPaused = true;
        document.body.classList.add('disco-bg');
        document.getElementById('bounce-guide').style.display = "block";
        document.getElementById('text-display').style.display = "none";
        document.getElementById('interactive-area').innerHTML = "";
        
        const g = document.getElementById('cat-hbd');
        g.style.display = "block";
        cat.x = window.innerWidth / 2 - 70;
        cat.y = window.innerHeight / 2 - 70;
        cat.vx = (Math.random() > 0.5 ? 5 : -5);
        cat.vy = -6;
        g.style.left = cat.x + 'px'; g.style.top = cat.y + 'px';
        
        finalLoopId = requestAnimationFrame(updateCatPhysics);
    }

    function updateCatPhysics() {
        if (!cat.isDragging) {
            cat.x += cat.vx; cat.y += cat.vy;
            cat.vx *= 0.985; cat.vy *= 0.985;

            if (cat.x <= 0) { cat.x = 0; cat.vx *= -1; hitEdges.left = true; checkAllEdges(); }
            else if (cat.x + cat.width >= window.innerWidth) { cat.x = window.innerWidth - cat.width; cat.vx *= -1; hitEdges.right = true; checkAllEdges(); }

            if (cat.y <= 0) { cat.y = 0; cat.vy *= -1; hitEdges.top = true; checkAllEdges(); }
            else if (cat.y + cat.height >= window.innerHeight) { cat.y = window.innerHeight - cat.height; cat.vy *= -1; hitEdges.bottom = true; checkAllEdges(); }
        }

        const g = document.getElementById('cat-hbd');
        g.style.left = cat.x + 'px'; g.style.top = cat.y + 'px';
        finalLoopId = requestAnimationFrame(updateCatPhysics);
    }

    function startDrag(e) {
        e.preventDefault(); cat.isDragging = true;
        const pointer = e.touches ? e.touches[0] : e;
        dragData.startX = pointer.clientX - cat.x; dragData.startY = pointer.clientY - cat.y;
        dragData.lastX = pointer.clientX; dragData.lastY = pointer.clientY;
        dragData.lastTime = Date.now();

        document.addEventListener('mousemove', dragMove); document.addEventListener('mouseup', endDrag);
        document.addEventListener('touchmove', dragMove, { passive: false }); document.addEventListener('touchend', endDrag);
    }

    function dragMove(e) {
        if (!cat.isDragging) return;
        const pointer = e.touches ? e.touches[0] : e;
        cat.x = pointer.clientX - dragData.startX; cat.y = pointer.clientY - dragData.startY;

        const now = Date.now(); const dt = now - dragData.lastTime;
        if (dt > 0) {
            cat.vx = (pointer.clientX - dragData.lastX) / dt * 15; 
            cat.vy = (pointer.clientY - dragData.lastY) / dt * 15;
        }
        dragData.lastX = pointer.clientX; dragData.lastY = pointer.clientY; dragData.lastTime = now;
    }

    function endDrag() {
        cat.isDragging = false;
        document.removeEventListener('mousemove', dragMove); document.removeEventListener('mouseup', endDrag);
        document.removeEventListener('touchmove', dragMove); document.removeEventListener('touchend', endDrag);
    }

    function checkAllEdges() {
        if (hitEdges.top && hitEdges.bottom && hitEdges.left && hitEdges.right) {
            document.getElementById('bounce-guide').style.display = "none";
            const area = document.getElementById('interactive-area');
            if (!document.getElementById('btn-open-gift')) {
                area.innerHTML = `<button id="btn-open-gift" class="btn-main" style="background:#ffeb3b; color:#333; font-size:1.4rem; border:3px solid #fff; box-shadow:0 0 20px #fff;" onclick="openLetterCard(event)">افتحي هديتك (الرسالة) 🎁</button>`;
            }
        }
    }

    function openLetterCard(e) {
        e.stopPropagation();
        cancelAnimationFrame(finalLoopId);
        document.getElementById('cat-hbd').style.display = "none";
        document.getElementById('main-box').style.display = "none";
        
        const card = document.getElementById('letter-card'); card.classList.add('open');
        
        const textContent = `نور، هاي جد من احلى التجارب الي عملتها بحياتي، عملت اشي احبه لشخص احبه، استمتعت كثير، و اتعبت كثير ، و بحثت كثير ،بس مو علفاضي بالعكس كل الي عملته عشان تفرحي و عشان تستمتعي كمان ، قبل بشهر تقريبا كنت قاعد افكر: اوه، نور عيد ميلادها قرب و يعني مو حلو ما اهديها اشي و برضو مو حاب اكتفي بس بكل عام و انتِ بخير ؛ فإجت فكرة اني اسويلك اللعبه.\n\nاعترف الموضوع ما كان سهل بس ممتع و محرز كمان.\n\nهاي الرسالة تعبير عن مدى حبي الك، و الكم من العشق الي بقلبي الك، نور اتمنى انّا نعيش مع بعض ان شاء الله، و بس،\n\nاحبك نور،\nجاد.`;
        
        let charIndex = 0; const targetDiv = document.getElementById('typed-content');
        function typeWriter() {
            if (charIndex < textContent.length) {
                targetDiv.innerHTML += textContent.charAt(charIndex); charIndex++;
                setTimeout(typeWriter, 35); 
            }
        }
        typeWriter();
    }

    function showStatsSummary() {
        document.getElementById('letter-card').classList.remove('open');
        const statsCard = document.getElementById('stats-card'); statsCard.classList.add('open');
        let endTime = new Date();
        let totalSeconds = Math.floor((endTime - startTime) / 1000) || 0;
        let mins = Math.floor(totalSeconds / 60); let secs = totalSeconds % 60;
        let timeStr = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;

        document.getElementById('stat-correct').innerText = correctAnswersCount;
        document.getElementById('stat-wrong').innerText = wrongAnswersCount;
        document.getElementById('stat-time').innerText = timeStr;
        document.getElementById('stat-score').innerText = (lives < 0 ? 0 : lives);
    }

    function resetGame(e) {
        if(e) e.stopPropagation(); location.reload();
    }

    function createParticle(x, y) {
        const h = document.createElement('div'); h.innerHTML = currentThemeParticle; h.className = 'heart-fly';
        h.style.left = x + 'px'; h.style.top = y + 'px'; document.body.appendChild(h); setTimeout(() => h.remove(), 800);
    }

    function showGameOver() {
        const text = document.getElementById('text-display'); const area = document.getElementById('interactive-area');
        clearTotemView();
        if (!extraUsed) {
            text.innerText = "خسرتي كل قلوبك هههه بس عشان عيد ميلادك خذي روح زيادة 🐣";
            area.innerHTML = `<button class="btn-main" onclick="lives=1; extraUsed=true; document.getElementById('lives').innerText = lives; floatNumber('+1 🐣', true); nextStep();">أوكيه</button>`;
        } else {
            text.innerText = "خسرتي يا مكعب هههههههههه";
            area.innerHTML = `<button class="btn-main" onclick="resetGame(event)">إعادة من البداية</button>`;
        }
    }
</script>
</body>
</html>
